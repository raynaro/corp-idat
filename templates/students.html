{% extends 'base.html' %}{% block content %}<section class="card"><h2>Lista de alumnos</h2><form class="search"><input name="q" value="{{q}}" placeholder="Buscar por nombre, DNI o código"><button>Buscar</button></form><table><tr><th>#</th><th>Nombre</th><th>DNI</th><th>Código</th><th>Fecha</th><th>Estado</th></tr>{% for s in students %}<tr><td>{{loop.index}}</td><td>{{s.name}}</td><td>{{s.dni}}</td><td>{{s.code}}</td><td>{{s.entry_date}}</td><td><span class="badge {{'activo' if s.active else 'inactivo'}}">{{'ACTIVO' if s.active else 'INACTIVO'}}</span></td></tr>{% endfor %}</table></section>{% endblock %}
