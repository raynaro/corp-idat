{% extends 'base.html' %}{% block content %}<section class="card"><div class="top"><div><h2>Usuarios del sistema</h2><p>Roles disponibles: Administrador, SAE, Ventas y Seguridad.</p></div><a class="btn" href="{{url_for('register')}}">+ Crear usuario</a></div><table><tr><th>#</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Creado</th></tr>{% for u in users %}<tr><td>{{u.id}}</td><td>{{u.name}}</td><td>{{u.email}}</td><td>{{roles.get(u.role,u.role)}}</td><td>{{u.created_at}}</td></tr>{% endfor %}</table></section>{% endblock %}
