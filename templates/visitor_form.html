{% extends 'base.html' %}{% block content %}<section class="card consult"><h2>Registro de persona nueva</h2><p>Para personas que ingresan al instituto y no están en la base. La hora se guarda con zona horaria Lima/Perú.</p><form method="post" class="formgrid"><input name="full_name" placeholder="Nombres completos" required><input name="dni" placeholder="DNI" required>{% if session.get('role')=='sae' %}<input value="SAE" disabled><input type="hidden" name="destination_area" value="SAE">{% elif session.get('role')=='sales' %}<input value="VENTAS" disabled><input type="hidden" name="destination_area" value="VENTAS">{% else %}<select name="destination_area" required><option value="">Área a la que va</option><option value="SAE" {% if selected_area=='SAE' %}selected{% endif %}>SAE</option><option value="VENTAS" {% if selected_area=='VENTAS' %}selected{% endif %}>VENTAS</option></select>{% endif %}<input name="reason" placeholder="Motivo u observación opcional"><button>Registrar visita</button></form></section>{% endblock %}
